<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏列表</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 80%;
            max-width: 600px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .game-list {
            list-style: none;
            padding: 0;
        }
        .game-item {
            margin-bottom: 20px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 8px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .game-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .game-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .game-description {
            color: #666;
            margin-bottom: 15px;
        }
        .game-link {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }
        .game-link:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>游戏列表</h1>
        <ul class="game-list">
            <li class="game-item">
                <div class="game-title">Snake 游戏</div>
                <div class="game-description">一个经典的贪吃蛇游戏，使用 Godot 引擎开发。</div>
                <a href="snake/Snake.html" class="game-link" target="_blank">开始游戏</a>
            </li>
            <li class="game-item">
                <div class="game-title">Tetris 游戏</div>
                <div class="game-description">一个经典的俄罗斯方块游戏，使用 Godot 引擎开发。</div>
                <a href="tetris/Tetris.html" class="game-link" target="_blank">开始游戏</a>
            </li>
        </ul>
    </div>
</body>
</html>
